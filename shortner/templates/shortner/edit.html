{% extends 'base.html' %}
{% block title %}Edit Short URL{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title mb-4">Edit Short URL</h4>
                <form method="POST">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            <input 
                                type="{{ field.field.widget.input_type }}" 
                                name="{{ field.html_name }}"
                                class="form-control {% if field.errors %}is-invalid{% endif %}"
                                value="{{ field.value|default:'' }}"
                                {% if not field.field.required %}placeholder="Optional"{% endif %}
                            >
                            {% for error in field.errors %}
                                <div class="invalid-feedback">{{ error }}</div>
                            {% endfor %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100">Save Changes</button>
                </form>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary w-100 mt-2">Cancel</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
